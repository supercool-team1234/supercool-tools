<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Cool Customer Terms Database</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
  }

  header {
    background: #1a1a1a;
    color: #fff;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.5;
  }

  header h1 {
    font-size: 15px;
    font-weight: 500;
    opacity: 0.9;
  }

  header .divider {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.2);
  }

  header .refresh-btn {
    margin-left: auto;
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.7;
    transition: opacity 0.15s;
  }

  header .refresh-btn:hover { opacity: 1; }

  .toolbar {
    background: #fff;
    border-bottom: 1px solid #e8e8e6;
    padding: 12px 1.5rem;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }

  #search {
    width: 100%;
    height: 38px;
    padding: 0 12px 0 34px;
    font-size: 14px;
    border: 1px solid #e0e0de;
    border-radius: 8px;
    outline: none;
    background: #fafafa;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  #search:focus {
    border-color: #1a1a1a;
    box-shadow: 0 0 0 3px rgba(26,26,26,0.06);
    background: #fff;
  }

  #terms-filter {
    height: 38px;
    padding: 0 10px;
    font-size: 13px;
    border: 1px solid #e0e0de;
    border-radius: 8px;
    background: #fafafa;
    outline: none;
    cursor: pointer;
  }

  #terms-filter:focus { border-color: #1a1a1a; }

  .count-bar {
    padding: 10px 1.5rem;
    font-size: 12px;
    color: #888;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    display: inline-block;
  }

  .status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
  .status-dot.error { background: #ef4444; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    padding: 0 1.5rem 2rem;
  }

  .card {
    background: #fff;
    border: 1px solid #e8e8e6;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    transition: box-shadow 0.15s;
  }

  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.3;
  }

  .card-contact {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .badge-net30 { background: #dcfce7; color: #166534; }
  .badge-net60 { background: #dbeafe; color: #1e40af; }
  .badge-net90 { background: #ede9fe; color: #5b21b6; }
  .badge-cod   { background: #f3f4f6; color: #374151; }
  .badge-other { background: #fef3c7; color: #92400e; }

  .card-rows { border-top: 1px solid #f0f0ee; padding-top: 10px; }

  .card-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
  }

  .card-row-label { color: #999; }
  .card-row-val { font-weight: 500; color: #1a1a1a; text-align: right; max-width: 60%; }

  .card-notes {
    font-size: 11.5px;
    color: #999;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #f0f0ee;
    font-style: italic;
    line-height: 1.5;
  }

  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem;
    color: #aaa;
    font-size: 14px;
  }

  .empty svg { display: block; margin: 0 auto 12px; opacity: 0.3; }

  .setup-banner {
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 8px;
    padding: 12px 16px;
    margin: 1rem 1.5rem 0;
    font-size: 13px;
    color: #92400e;
    line-height: 1.6;
  }

  .setup-banner strong { font-weight: 600; }
  .setup-banner a { color: #92400e; }
</style>
</head>
<body>

<header>
  <span class="logo">Super Cool</span>
  <span class="divider"></span>
  <h1>Customer Terms Database</h1>
  <button class="refresh-btn" onclick="loadData()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
    Refresh
  </button>
</header>

<div id="setup-banner" class="setup-banner" style="display:none">
  <strong>One-time setup needed:</strong> Open your <a id="sheet-link" href="#" target="_blank">Google Sheet</a>, click <strong>Share → Anyone with the link → Viewer</strong>, then click the Refresh button above.
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search by name, contact, notes…" oninput="render()">
  </div>
  <select id="terms-filter" onchange="render()">
    <option value="">All terms</option>
    <option>Net 30</option>
    <option>Net 60</option>
    <option>Net 90</option>
    <option>COD</option>
    <option>Other</option>
  </select>
</div>

<div class="count-bar">
  <span class="status-dot loading" id="status-dot"></span>
  <span id="status-text">Loading…</span>
</div>

<div class="grid" id="grid"></div>

<script>
const SHEET_ID = "1cYI8J_8EDhWx9_PW3a6ImWA3Y2ENLzETU0SuZhQbOug";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`;

let customers = [];
let loaded = false;

document.getElementById("sheet-link").href = SHEET_URL;

function parseCSV(text) {
  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h => h.replace(/"/g, "").trim());
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
      else { cur += c; }
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || "").replace(/"/g, "").trim());
    return obj;
  }).filter(r => r["Company Name"]);
}

async function loadData() {
  const dot = document.getElementById("status-dot");
  const txt = document.getElementById("status-text");
  dot.className = "status-dot loading";
  txt.textContent = "Loading…";
  document.getElementById("setup-banner").style.display = "none";

  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error("not public");
    const text = await res.text();
    if (text.includes("<html")) throw new Error("not public");
    customers = parseCSV(text);
    loaded = true;
    dot.className = "status-dot";
    txt.textContent = "";
    render();
  } catch(e) {
    dot.className = "status-dot error";
    txt.textContent = "Sheet not public yet — see setup note above";
    document.getElementById("setup-banner").style.display = "block";
    customers = [];
    render();
  }
}

function badgeClass(t) {
  const m = {"Net 30":"badge-net30","Net 60":"badge-net60","Net 90":"badge-net90","COD":"badge-cod"};
  return m[t] || "badge-other";
}

function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const tf = document.getElementById("terms-filter").value;
  const list = customers.filter(c => {
    const haystack = [c["Company Name"],c["Contact Name"],c["Phone"],c["Email"],c["Notes"]].join(" ").toLowerCase();
    return haystack.includes(q) && (!tf || c["Payment Terms"] === tf);
  });

  const dot = document.getElementById("status-dot");
  const txt = document.getElementById("status-text");
  if (loaded) {
    dot.className = "status-dot";
    txt.textContent = list.length + " customer" + (list.length !== 1 ? "s" : "");
  }

  const grid = document.getElementById("grid");
  if (!list.length) {
    grid.innerHTML = `<div class="empty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      ${loaded ? "No customers match your search." : ""}
    </div>`;
    return;
  }

  grid.innerHTML = list.map(c => `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="card-name">${c["Company Name"]}</div>
          <div class="card-contact">${c["Contact Name"] || ""}</div>
        </div>
        <span class="badge ${badgeClass(c["Payment Terms"])}">${c["Payment Terms"] || "—"}</span>
      </div>
      <div class="card-rows">
        <div class="card-row">
          <span class="card-row-label">Phone</span>
          <span class="card-row-val">${c["Phone"] || "—"}</span>
        </div>
        <div class="card-row">
          <span class="card-row-label">Email</span>
          <span class="card-row-val">${c["Email"] || "—"}</span>
        </div>
        <div class="card-row">
          <span class="card-row-label">Credit limit</span>
          <span class="card-row-val">${c["Credit Limit"] || "—"}</span>
        </div>
      </div>
      ${c["Notes"] ? `<div class="card-notes">${c["Notes"]}</div>` : ""}
    </div>
  `).join("");
}

loadData();
</script>
</body>
</html>
